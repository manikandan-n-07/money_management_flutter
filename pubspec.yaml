name: money_management
description: "Cashier — Offline Expense Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animations: ^2.0.11

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.69.0

  # PDF & Excel Export
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.6

  # File & Share
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    image_path: "money_management_logo.png"
    icon_size: 256
  image_path: "money_management_logo.png"

msix_config:
  display_name: "CashierM"
  publisher_display_name: "Manilunar"
  identity_name: "Manilunar.CashierM"
  publisher: "CN=C5F01A0E-CA67-431B-9430-AF9489AC86DF"
  version: "1.0.0.0"
  logo_path: "money_management_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
